services:
  basibasaubackend:
    container_name: basibasaubackend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - 5000:5000
    environment:
      - POSGRES_URL=postgresql://admin:root@basibasaupostgres:5432/basibasau
    env_file:
      - ./backend/.env
    networks:
      - basibasaunetwork
    depends_on:
      - basibasaupostgres
    volumes:
      - ./backend:/home/basibasau
      - /home/basibasau/node_modules
    command: npm run dev

  basibasaupostgres:
    container_name: basibasaupostgres
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_HOST: basibasaupostgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
      POSTGRES_DB: basibasau
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - basibasaunetwork

  adminerbasibasau:
    container_name: adminerbasibasau
    image: adminer:5
    environment:
      ADMINER_DEFAULT_SERVER: basibasaupostgres
    restart: unless-stopped
    networks:
      - basibasaunetwork
    ports:
      - 8080:8080
    depends_on:
      - basibasaupostgres

volumes:
  postgres_data:

networks:
  basibasaunetwork:
